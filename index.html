<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สาธิต EMF</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1923;font-family:'Segoe UI',Arial,sans-serif;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:8px;}
#c{display:block;border-radius:12px;background:#091825;flex-shrink:0;}
.row{display:flex;gap:8px;flex-wrap:wrap;}
.cg{display:flex;align-items:center;gap:8px;background:#1a3450;border-radius:10px;padding:7px 12px;flex:1;min-width:130px;}
.cg label{font-size:12px;color:#a0b8cc;min-width:48px;}
.cg input{flex:1;accent-color:#1D9E75;}
.cg span{font-size:13px;font-weight:700;color:#F3E4C9;min-width:30px;text-align:right;}
button{background:#1a3450;border:1px solid #2a5070;color:#F3E4C9;border-radius:8px;padding:6px 16px;font-size:13px;cursor:pointer;}
button:hover{background:#234a6e;}
button.on{background:#1D9E75;border-color:#1D9E75;}
.card{background:#1a3450;border-radius:10px;padding:8px 12px;flex:1;}
.card .lbl{font-size:11px;color:#6a8fa8;margin-bottom:2px;}
.card .val{font-size:20px;font-weight:700;color:#F3E4C9;}
.card .unit{font-size:11px;color:#6a8fa8;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="row" id="ctrl">
  <div class="cg"><label>v (m/s)</label><input type="range" id="slV" min="0.5" max="4" step="0.1" value="2" oninput="sync()"><span id="oV">2.0</span></div>
  <div class="cg"><label>B (T)</label><input type="range" id="slB" min="0.5" max="4" step="0.1" value="2" oninput="sync()"><span id="oB">2.0</span></div>
  <div class="cg"><label>L (m)</label><input type="range" id="slL" min="0.5" max="2" step="0.1" value="1" oninput="sync()"><span id="oL">1.0</span></div>
</div>
<div class="row" id="btns">
  <button id="btnP" class="on" onclick="togglePlay()">&#9646;&#9646; หยุด</button>
  <button onclick="resetWire()">&#8635; รีเซ็ต</button>
</div>
<div class="row" id="cards">
  <div class="card"><div class="lbl">EMF (e)</div><div><span class="val" id="dE">4.00</span> <span class="unit">V</span></div></div>
  <div class="card"><div class="lbl">ความเร็วอิเล็กตรอน</div><div><span class="val" id="dSpd" style="font-size:15px;">กลาง</span></div></div>
  <div class="card"><div class="lbl">สถานะ</div><div><span class="val" id="dS" style="font-size:13px;color:#1D9E75;">ในสนาม</span></div></div>
</div>

<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let fL,fR,fT,fB,fW,fH,wireX=0,playing=true;
let electrons=[],prevN=0,prevWY1=0,lastTs=0;

function sizeAll(){
  const ctrl=document.getElementById('ctrl');
  const btns=document.getElementById('btns');
  const cards=document.getElementById('cards');
  const uiH=ctrl.offsetHeight+btns.offsetHeight+cards.offsetHeight+8*4+20;
  const avW=Math.min(window.innerWidth-20,900);
  const avH=Math.max(180,window.innerHeight-uiH-20);
  cv.width=avW; cv.height=avH;
  cv.style.width=avW+'px'; cv.style.height=avH+'px';
  [ctrl,btns,cards].forEach(el=>el.style.width=avW+'px');
  fL=Math.round(avW*0.08); fR=Math.round(avW*0.86);
  fT=Math.round(avH*0.06); fB=Math.round(avH*0.90);
  fW=fR-fL; fH=fB-fT;
  resetWire();
}

function resetWire(){ wireX=fL-60; }
function gV(){ return parseFloat(document.getElementById('slV').value); }
function gB(){ return parseFloat(document.getElementById('slB').value); }
function gL(){ return parseFloat(document.getElementById('slL').value); }
function sync(){
  document.getElementById('oV').textContent=gV().toFixed(1);
  document.getElementById('oB').textContent=gB().toFixed(1);
  document.getElementById('oL').textContent=gL().toFixed(1);
}
function togglePlay(){
  playing=!playing;
  const b=document.getElementById('btnP');
  b.innerHTML=playing?'&#9646;&#9646; หยุด':'&#9654; เล่น';
  b.className=playing?'on':'';
}
function initEl(n){ electrons=[]; for(let i=0;i<n;i++) electrons.push({phase:i/n}); }

function draw(ts){
  const dt=Math.min(ts-lastTs,50)/1000; lastTs=ts;
  const W=cv.width,H=cv.height;
  const B=gB(),v=gV(),L=gL();
  const e=(B*L*v).toFixed(2);
  const wx=Math.max(fL+2,Math.min(fR-2,wireX));
  const inField=wireX>fL+2&&wireX<fR-2;
  const eSpeed=B*v;

  ctx.clearRect(0,0,W,H);

  // field bg
  ctx.fillStyle='#091825';
  ctx.beginPath();ctx.roundRect(fL,fT,fW,fH,10);ctx.fill();
  ctx.strokeStyle='#1a4060';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.roundRect(fL,fT,fW,fH,10);ctx.stroke();

  // B dots
  const cols=10,rows=6;
  const dsx=fW/(cols+1),dsy=fH/(rows+1);
  const dotR=Math.max(3,dsx*0.18+B*0.6);
  for(let r=1;r<=rows;r++){
    for(let c=1;c<=cols;c++){
      const dx=fL+c*dsx,dy=fT+r*dsy;
      ctx.globalAlpha=Math.min(1,0.40+B*0.13);
      ctx.fillStyle='#378ADD';
      ctx.beginPath();ctx.arc(dx,dy,dotR,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#B5D4F4';
      ctx.beginPath();ctx.arc(dx,dy,dotR*0.35,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;

  // B label — font เล็กลง
  const lfs=Math.max(10,Math.round(fH*0.048));
  ctx.fillStyle='rgba(9,24,40,0.85)';ctx.fillRect(fL+5,fT+5,lfs*13.5,lfs+7);
  ctx.fillStyle='#85B7EB';ctx.font=`${lfs}px Arial`;ctx.textAlign='left';
  ctx.fillText(`B = ${B.toFixed(1)} T  (ออกจากกระดาษ)`,fL+9,fT+lfs+3);

  // wire geometry — ลวดสูงสุด 60% ของ field ไม่ว่า L จะเป็นเท่าไหร่
  const midY=(fT+fB)/2;
  const maxHalf=fH*0.30;               // จำกัด wire สูงสุด 60% field
  const halfLen=maxHalf*(L/2.0);        // L=2 → เต็ม maxHalf
  const wY1=midY-halfLen, wY2=midY+halfLen;
  const wireLen=wY2-wY1;
  const wireW=Math.max(2,2+L*0.5);

  if(inField){
    ctx.strokeStyle='rgba(127,119,221,0.15)';ctx.lineWidth=wireW+12;
    ctx.beginPath();ctx.moveTo(wx,wY1);ctx.lineTo(wx,wY2);ctx.stroke();
  }
  ctx.strokeStyle='#7F77DD';ctx.lineWidth=wireW;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(wx,wY1);ctx.lineTo(wx,wY2);ctx.stroke();
  ctx.lineCap='butt';

  // P บนลวด, Q ล่างลวด — ไม่ทับ e label
  ctx.fillStyle='#F3E4C9';ctx.font=`bold ${lfs}px Arial`;ctx.textAlign='center';
  ctx.fillText('P',wx,wY1-10);
  ctx.fillText('Q',wx,wY2+lfs+4);

  // L ruler อยู่ขวาลวดติดกัน
  const rulerX=wx+wireW+8;
  ctx.strokeStyle='#AFA9EC';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(rulerX,wY1);ctx.lineTo(rulerX,wY2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(rulerX-4,wY1);ctx.lineTo(rulerX+4,wY1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(rulerX-4,wY2);ctx.lineTo(rulerX+4,wY2);ctx.stroke();

  // L label — กรอบพื้นขาว ขอบมน
  const Ltxt=`L=${L.toFixed(1)}m`;
  const Lfs=lfs-1;
  ctx.font=`bold ${Lfs}px Arial`;
  const Ltw=ctx.measureText(Ltxt).width;
  const Lpx=rulerX+10, Lpy=midY-lfs*1.8;
  const Lpad=4;
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.roundRect(Lpx-Lpad, Lpy-Lfs-Lpad+2, Ltw+Lpad*2, Lfs+Lpad*2, 5);
  ctx.fill();
  ctx.strokeStyle='#AFA9EC';ctx.lineWidth=0.8;ctx.stroke();
  ctx.fillStyle='#0A2947';ctx.textAlign='left';
  ctx.fillText(Ltxt, Lpx, Lpy);

  // v arrow — เริ่มจากขวาลวดติดกัน ระดับ midY
  const arrStart=wx+wireW+8;
  const arrLen=Math.max(18,fW*0.03)+v*fW*0.018;
  const ay=midY+lfs*1.4;
  ctx.strokeStyle='#EF9F27';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(arrStart,ay);ctx.lineTo(arrStart+arrLen,ay);ctx.stroke();
  ctx.fillStyle='#EF9F27';
  ctx.beginPath();
  ctx.moveTo(arrStart+arrLen,ay-5);
  ctx.lineTo(arrStart+arrLen+9,ay);
  ctx.lineTo(arrStart+arrLen,ay+5);
  ctx.fill();
  ctx.font=`bold ${lfs}px Arial`;ctx.textAlign='left';
  ctx.fillText('v',arrStart+arrLen+10,ay+5);

  // e label อยู่กึ่งกลาง field ด้านล่าง ไม่ทับ Q
  // วาง e ที่ fB - lfs*0.5 เสมอ (ต่ำกว่า wY2+lfs+4 เสมอเพราะ wY2 < fB-lfs*2)
  const eLabelY=fB+lfs+4;

  // electrons
  if(inField){
    const nE=Math.min(6,Math.max(2,Math.round(L*2.5)));
    const eR=Math.min(
      Math.floor(wireLen/(nE*2.6)),
      Math.max(4,Math.round(fH*0.030))
    );

    if(nE!==prevN||Math.abs(wY1-prevWY1)>1){ initEl(nE);prevN=nE;prevWY1=wY1; }
    for(let i=0;i<electrons.length;i++)
      electrons[i].phase=(electrons[i].phase+eSpeed*dt*0.22)%1;

    for(let i=0;i<electrons.length;i++){
      const p=electrons[i].phase;
      const ey=wY2-p*wireLen;
      const trailLen=Math.min(wireLen*0.35,eR*2.5+eSpeed*3);
      for(let t=1;t<=6;t++){
        const tp=p-(t/6)*(trailLen/wireLen);
        if(tp<0) continue;
        ctx.globalAlpha=(1-t/6)*0.4;
        ctx.fillStyle='#E24B4A';
        ctx.beginPath();ctx.arc(wx,wY2-tp*wireLen,eR*(1-t/7)+1,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.fillStyle='#E24B4A';
      ctx.beginPath();ctx.arc(wx,ey,eR,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#F09595';ctx.lineWidth=1.2;ctx.stroke();
      ctx.fillStyle='#fff';
      ctx.font=`bold ${Math.max(9,Math.round(eR*1.4))}px Arial`;
      ctx.textAlign='center';
      ctx.fillText('−',wx,ey+eR*0.38);
    }

    // e label ต่ำกว่า Q เสมอ
    ctx.fillStyle='#1D9E75';ctx.font=`bold ${lfs+1}px Arial`;ctx.textAlign='center';
    ctx.fillText(`e = ${e} V`,wx,eLabelY);

    // speedometer bar — หนาขึ้น + label เร็ว/ช้า ชัดขึ้น
    const barW=Math.max(18,Math.round(fW*0.028));
    const barX=fR+10,barY=fT+10,barH=fH-20;
    ctx.fillStyle='#0a1e30';
    ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,6);ctx.fill();
    ctx.strokeStyle='#1a4060';ctx.lineWidth=0.8;ctx.stroke();
    const ratio=Math.min(1,eSpeed/16);
    const fillH=ratio*barH;
    const rr=Math.round(ratio>0.5?(ratio-0.5)*2*220+35:35);
    const gg=Math.round(ratio<0.5?158:158*(1-(ratio-0.5)*2));
    ctx.fillStyle=`rgb(${rr},${gg},40)`;
    ctx.beginPath();ctx.roundRect(barX,barY+barH-fillH,barW,fillH,4);ctx.fill();

    // label เร็ว (บน) — สีแดง ฟอนต์ใหญ่ขึ้น
    ctx.fillStyle='#E24B4A';ctx.font=`bold 13px Arial`;ctx.textAlign='center';
    ctx.fillText('เร็ว',barX+barW/2,barY-5);
    ctx.strokeStyle='#E24B4A';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(barX,barY);ctx.lineTo(barX+barW,barY);ctx.stroke();

    // label ช้า (ล่าง) — สีฟ้า ฟอนต์ใหญ่ขึ้น
    ctx.fillStyle='#85B7EB';ctx.font=`bold 13px Arial`;ctx.textAlign='center';
    ctx.fillText('ช้า',barX+barW/2,barY+barH+16);
    ctx.strokeStyle='#85B7EB';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(barX,barY+barH);ctx.lineTo(barX+barW,barY+barH);ctx.stroke();

    const lvl=eSpeed<4?'ช้า':eSpeed<8?'กลาง':eSpeed<12?'เร็ว':'เร็วมาก';
    const col=eSpeed<4?'#85B7EB':eSpeed<8?'#EF9F27':eSpeed<12?'#E24B4A':'#F09595';
    document.getElementById('dSpd').textContent=lvl;
    document.getElementById('dSpd').style.color=col;
    document.getElementById('dS').textContent='ในสนาม';
    document.getElementById('dS').style.color='#1D9E75';
  } else {
    if(prevN!==0){ electrons=[];prevN=0; }
    document.getElementById('dSpd').textContent='—';
    document.getElementById('dSpd').style.color='#888';
    document.getElementById('dS').textContent='นอกสนาม';
    document.getElementById('dS').style.color='#888';
  }
  document.getElementById('dE').textContent=e;
}

function loop(ts){
  if(playing){ wireX+=gV()*0.8; if(wireX>fR+70) wireX=fL-70; }
  draw(ts); requestAnimationFrame(loop);
}

window.addEventListener('resize',sizeAll);
window.addEventListener('load',()=>{ sizeAll(); sync(); requestAnimationFrame(loop); });
</script>
</body>
</html>
